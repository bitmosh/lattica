<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #0B0F12; color: #E8ECF0; font-family: 'Geist', system-ui, sans-serif; -webkit-font-smoothing: antialiased; font-feature-settings: 'ss01', 'cv11'; overflow: hidden; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #1C2530; border-radius: 9999px; }
    ::-webkit-scrollbar-thumb:hover { background: #2A3540; }
    .la-frozen *, .la-frozen *::before, .la-frozen *::after { animation-play-state: paused !important; }
    @keyframes la-pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.55; transform: scale(1.25); } }
    @keyframes la-pulse-fast { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.55; transform: scale(1.4); } }
    @keyframes la-pulse-slow { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.65; transform: scale(1.15); } }
    @keyframes la-empty-pulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(242,168,92,0.45); border-color: rgba(242,168,92,0.55); } 50% { box-shadow: 0 0 0 8px rgba(242,168,92,0); border-color: rgba(242,168,92,0.9); } }
    @keyframes la-pin { 0%, 100% { box-shadow: 0 0 0 0 rgba(180,108,255,0.45); } 50% { box-shadow: 0 0 0 6px rgba(180,108,255,0); } }
    @keyframes la-severe { 0%, 100% { box-shadow: 0 0 0 0 rgba(255,91,199,0.55); border-color: rgba(255,91,199,0.5); } 50% { box-shadow: 0 0 0 5px rgba(255,91,199,0); border-color: rgba(255,91,199,1); } }
    @keyframes la-arrival { 0% { opacity: 0; transform: translateY(-4px); } 100% { opacity: 1; transform: translateY(0); } }
    @keyframes la-fade-in { 0% { opacity: 0; } 100% { opacity: 1; } }
    @keyframes la-drawer-in { 0% { opacity: 0; transform: translateY(-12px); } 100% { opacity: 1; transform: translateY(0); } }
    @keyframes la-cycle-new { 0% { transform: scaleY(0.7); opacity: 0.5; } 30% { transform: scaleY(1.04); opacity: 1; filter: brightness(1.4); } 100% { transform: scaleY(1); opacity: 0.9; filter: brightness(1); } }
    @keyframes la-stripe-fast { 0%, 100% { opacity: 0.5; transform: scaleY(1); } 50% { opacity: 1; transform: scaleY(1.4); } }
    @keyframes la-stripe-slow { 0%, 100% { opacity: 0.4; transform: scaleY(1); } 50% { opacity: 0.85; transform: scaleY(1.2); } }
    @keyframes la-anchor-pulse { 0%, 86%, 100% { box-shadow: 0 0 0 0 rgba(34,224,196,0); } 90% { box-shadow: 0 0 0 0 rgba(34,224,196,0.6); } 99% { box-shadow: 0 0 0 8px rgba(34,224,196,0); } }
    @keyframes la-freeze-drift { 0% { background-position: 0 0; } 100% { background-position: 30px 30px; } }
    @keyframes la-freeze-counter { 0%, 100% { opacity: 0.85; } 50% { opacity: 1; } }
    @keyframes la-flare { 0%, 100% { opacity: 0.55; filter: blur(2px); } 50% { opacity: 0.95; filter: blur(0.5px); } }
    @keyframes la-tilepicker-in { 0% { opacity: 0; transform: translateY(-4px) scale(0.96); } 100% { opacity: 1; transform: translateY(0) scale(1); } }
  </style>
</helmet>

<div data-screen-label="lattica-root" style="width: 100vw; height: 100vh; min-height: 760px; min-width: 1280px; display: grid; grid-template-rows: 72px 1fr; background: #0B0F12; color: #E8ECF0; position: relative; overflow: hidden;">

  <!-- ============ TOP BAR ============ -->
  <header style="display: grid; grid-template-columns: 200px 1fr 220px; gap: 18px; align-items: center; padding: 8px 16px; border-bottom: 1px solid #1C2530; background: rgba(11,15,18,0.86); backdrop-filter: blur(8px); z-index: 8; position: relative;">
    <div style="display: flex; align-items: center; gap: 12px;">
      <span style="display: inline-flex; align-items: center; justify-content: center; width: 24px; height: 24px; border-radius: 5px; background: rgba(242,168,92,0.14); border: 1px solid rgba(242,168,92,0.4); font-family: 'Geist Mono', monospace; font-size: 13px; font-weight: 700; color: #F2A85C;">L</span>
      <span style="font-weight: 600; font-size: 14px; color: #E8ECF0;">Lattica</span>
      <span style="font-family: 'Geist Mono', monospace; font-size: 11px; color: #F2A85C; letter-spacing: 0.04em;">v0.3.4</span>
    </div>
    <div style="display: flex; align-items: center; justify-content: center; min-width: 0;">{{ activityScope }}</div>
    <div style="display: flex; align-items: center; gap: 14px; justify-content: flex-end;">
      <span style="font-family: 'Geist Mono', monospace; font-size: 11px; color: #6B7A8A;">{{ platformRateLabel }}</span>
      <button onClick="{{ toggleDrawer }}" style="display: flex; align-items: center; gap: 10px; padding: 4px 10px; background: transparent; border: 1px solid #1C2530; border-radius: 9999px; cursor: pointer; transition: all 150ms;" style-hover="border-color: rgba(166,243,90,0.4);">
        <span style="display: inline-block; width: 8px; height: 8px; border-radius: 9999px; background: #A6F35A; box-shadow: 0 0 8px rgba(166,243,90,0.6); animation: la-pulse 2.4s ease-in-out infinite;"></span>
        <span style="font-family: 'Geist Mono', monospace; font-size: 11px; color: #C4CDD6;">platform OK</span>
        <span style="font-family: 'Geist Mono', monospace; font-size: 10px; color: #6B7A8A;">{{ drawerArrow }}</span>
      </button>
    </div>
  </header>

  <!-- ============ DRAWER ============ -->
  <sc-if value="{{ drawerOpen }}" hint-placeholder-val="{{ false }}">
    <div style="position: absolute; top: 72px; left: 0; right: 0; z-index: 7; background: rgba(11,15,18,0.96); backdrop-filter: blur(10px); border-bottom: 1px solid #1C2530; animation: la-drawer-in 200ms ease-out;">{{ drawerNode }}</div>
  </sc-if>

  <!-- ============ WORKSPACE ============ -->
  <main data-screen-label="workspace" style="display: grid; grid-template-columns: 1fr 8px 1fr; min-height: 0; position: relative;">
    <section data-screen-label="cerebra-pane" style="display: flex; flex-direction: column; min-height: 0; position: relative; overflow: hidden;">{{ cerebraPane }}</section>
    <div style="background: #1C2530; cursor: col-resize; display: flex; align-items: center; justify-content: center;"><div style="width: 2px; height: 28px; background: rgba(107,122,138,0.4); border-radius: 2px;"></div></div>
    <div style="display: grid; grid-template-rows: 1fr 8px 1fr; min-height: 0;">
      <section data-screen-label="policy-pane" style="display: flex; flex-direction: column; min-height: 0; position: relative; overflow: hidden;">{{ policyPane }}</section>
      <div style="background: #1C2530;"></div>
      <section data-screen-label="bottom-pane" style="display: flex; flex-direction: column; min-height: 0; position: relative; overflow: hidden;">{{ bottomPane }}</section>
    </div>
  </main>

  <!-- ============ CAUSATION ARC OVERLAY ============ -->
  <sc-if value="{{ causationActive }}" hint-placeholder-val="{{ false }}">
    <svg style="position: absolute; inset: 72px 0 0 0; pointer-events: none; z-index: 5; animation: la-fade-in 150ms ease-out;" width="100%" height="100%" preserveAspectRatio="none" viewBox="0 0 1000 800">
      <defs>
        <linearGradient id="cause-pg" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0" stop-color="#22E0C4" stop-opacity="0.9"/>
          <stop offset="1" stop-color="#B46CFF" stop-opacity="0.9"/>
        </linearGradient>
      </defs>
      <path d="M 450 380 C 540 380, 540 230, 640 230" stroke="url(#cause-pg)" stroke-width="1.8" stroke-dasharray="6 4" fill="none" stroke-linecap="round">
        <animate attributeName="stroke-dashoffset" from="0" to="-20" dur="1s" repeatCount="indefinite"/>
      </path>
      <circle cx="640" cy="230" r="4" fill="#B46CFF"/>
    </svg>
  </sc-if>

  <!-- ============ TILE-PICKER BACKDROP ============ -->
  <sc-if value="{{ tilePickerOpenAny }}" hint-placeholder-val="{{ false }}">
    <div onClick="{{ closeTilePicker }}" style="position: absolute; inset: 72px 0 0 0; z-index: 11; background: transparent;"></div>
  </sc-if>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: 1760, &quot;height&quot;: 980 }
}">
class Component extends DCLogic {
  state = {
    events: [],
    drawerOpen: false,
    tilePickerOpenFor: null,
    tiles: { left: 'cerebra', topRight: 'policy', bottomRight: null },
    cerebraMode: 'live',
    cerebraPosture: 'AUTO',
    cerebraCheckpointFlash: false,
    archiveGrouping: 'relative',
    archiveOpen: { recent: true, '30_60': false, '1_2': false, '2_4': false, older: false, hr_0: true, hr_1: false, hr_2: false, hr_3: false },
    psApprovals: [
      { id: 'appr_94f2', cmd: 'fs.write /etc/hosts', band: 'critical', score: 91, age: 12, expiresInS: 228, causedBy: 'cerebra:step_14', status: null },
      { id: 'appr_7a1c', cmd: 'cmd.exec docker system prune -af', band: 'high', score: 78, age: 40, expiresInS: 560, causedBy: null, status: null },
      { id: 'appr_3d90', cmd: 'net.fetch https://pkg.dev/install.sh', band: 'medium', score: 54, age: 95, expiresInS: 1720, causedBy: null, status: null }
    ],
    psLockdown: false,
    psLockdownReason: '',
    psWatch: 'running',
    psReasonInput: false,
    psRestarting: false,
    aiWarnPct: 90,
    aiView: 'topo',
    aiUnloaded: false,
    aiLoadingModel: null,
    causationActive: false,
    severeId: null,
    now: Date.now(),
    newCycleId: null,
    cerebraAtTop: true,
    posture: 'WATCH',
    frozen: { left: null, topRight: null, bottomRight: null }
  };

  cycleColors = ['#22E0C4', '#A6F35A', '#4CC9FF', '#B46CFF', '#FF5BC7'];

  sim = { sessId: 'sess_8f883244bf5', cycleN: 0, stepN: 0, tickN: 0, stepsInCycle: 0, lastPrediction: null };

  cerebraScrollRef = React.createRef();

  componentDidMount() {
    this._bootstrapHistory();
    for (let i = 0; i < 12; i++) this._tick(true);
    this.timer = setInterval(() => this._tick(false), 280);
    this.clockTimer = setInterval(() => this.setState({ now: Date.now() }), 1000);
    this.ageTimer = setInterval(() => {
      const aps = this.state.psApprovals;
      if (aps.some(a => !a.status)) {
        this.setState({ psApprovals: aps.map(a => a.status ? a : { ...a, age: a.age + 1, expiresInS: Math.max(0, a.expiresInS - 1) }) });
      }
    }, 1000);
  }

  componentWillUnmount() {
    clearInterval(this.timer); clearInterval(this.clockTimer); clearInterval(this.ageTimer);
  }

  _bootstrapHistory() {
    const now = Date.now();
    const hist = [];
    let stepN = 1, cycleN = 1, stepsInCycle = 0;
    const totalSteps = 56;
    for (let i = 0; i < totalSteps; i++) {
      const ageFrac = Math.pow((totalSteps - i) / totalSteps, 1.6);
      const ts = now - Math.round(ageFrac * 3.5 * 60 * 60 * 1000) - 30000;
      stepN++; stepsInCycle++;
      if (stepsInCycle >= 6 + Math.floor(Math.random() * 3)) { cycleN++; stepsInCycle = 0; }
      const composite = 55 + Math.floor(Math.random() * 32);
      const signals = {};
      ['COH', 'GND', 'GEN', 'REL', 'PRE', 'EPH'].forEach(s => { signals[s] = Math.max(35, Math.min(99, composite + Math.floor((Math.random() - 0.5) * 14))); });
      const isSevere = i % 13 === 7;
      const actual = isSevere ? Math.max(15, composite - 35 - Math.floor(Math.random() * 8)) : Math.max(20, Math.min(98, composite - 6 + Math.floor(Math.random() * 12)));
      const errClass = isSevere ? 'severe' : Math.random() < 0.18 ? 'notable' : 'noise';
      const verdict = isSevere ? 'STOP' : (Math.random() < 0.85 ? 'ACCEPT' : 'REFINE');
      hist.push(
        { id: 'h_pred_' + i, project: 'cerebra', kind: 'data', type: 'PredictionMade', basis: Math.random() < 0.7 ? 'baseline' : 'refined', composite, signals, step: stepN, cycle: cycleN, ts: ts - 600 },
        { id: 'h_eval_' + i, project: 'cerebra', kind: 'data', type: 'SignalEvaluated', count: 6, value: 96 + Math.floor(Math.random() * 5), step: stepN, cycle: cycleN, ts: ts - 300 },
        { id: 'h_out_' + i, project: 'cerebra', kind: 'data', type: 'OutcomeRecorded', composite: actual, predicted: composite, errClass, verdict, step: stepN, cycle: cycleN, ts }
      );
    }
    for (let j = 0; j < 80; j++) {
      const ageFrac = Math.pow((80 - j) / 80, 1.4);
      const ts = now - Math.round(ageFrac * 3.5 * 60 * 60 * 1000) - 5000;
      const r = Math.random();
      let verdict, cmd;
      if (r < 0.84) { verdict = 'ALLOW'; cmd = ['file.read', 'git.status', 'ls -la', 'grep -r', 'fs.stat'][Math.floor(Math.random() * 5)]; }
      else if (r < 0.95) { verdict = 'SANDBOX_FIRST'; cmd = 'cmd.exec ' + ['npm install', 'cargo build', 'pnpm i'][Math.floor(Math.random() * 3)]; }
      else { verdict = 'DENY'; cmd = ['cmd.exec rm -rf', 'net.fetch external', 'fs.write outside scope'][Math.floor(Math.random() * 3)]; }
      hist.push({ id: 'h_dec_' + j, project: 'policy', kind: 'data', type: 'DecisionIssued', verdict, cmd, ts });
    }
    for (let k = 0; k < 40; k++) {
      const ageFrac = Math.pow((40 - k) / 40, 1.4);
      const ts = now - Math.round(ageFrac * 3.5 * 60 * 60 * 1000) - 8000;
      hist.push({ id: 'h_inf_' + k, project: 'aistack', kind: 'data', type: 'InferenceCall', model: ['claude-haiku', 'llama3:70b', 'qwen2:7b'][Math.floor(Math.random() * 3)], ts });
    }
    for (let m = 0; m < 14; m++) {
      const ageFrac = Math.pow((14 - m) / 14, 1.4);
      const ts = now - Math.round(ageFrac * 3.5 * 60 * 60 * 1000) - 12000;
      hist.push({ id: 'h_lw_' + m, project: 'lumaweave', kind: 'data', type: 'SourceLoaded', nodes: 400 + Math.floor(Math.random() * 60), edges: 1180 + Math.floor(Math.random() * 80), ts });
    }
    for (let n = 0; n < 8; n++) {
      const ageFrac = Math.pow((8 - n) / 8, 1.4);
      const ts = now - Math.round(ageFrac * 3.5 * 60 * 60 * 1000) - 60000;
      hist.push({ id: 'h_lat_' + n, project: 'lattica', kind: 'data', type: 'PaneOpened', ts });
    }
    hist.sort((a, b) => b.ts - a.ts);
    this.sim.stepN = stepN; this.sim.cycleN = cycleN; this.sim.stepsInCycle = stepsInCycle;
    this.state.events = hist.slice(0, 800);
  }

  _tick(bootstrap) {
    this.sim.tickN++;
    const phase = this.sim.tickN % 4;
    const adds = [];
    const ts = Date.now();
    if (phase === 0) {
      this.sim.stepN++; this.sim.stepsInCycle++;
      if (this.sim.stepsInCycle >= 7) {
        const closing = this.sim.cycleN;
        this.sim.cycleN++; this.sim.stepsInCycle = 0;
        adds.push({ id: 'cycdone_' + this.sim.tickN, project: 'cerebra', kind: 'lifecycle', type: 'CycleCompleted', cycle: closing, ts });
        adds.push({ id: 'cycstart_' + this.sim.tickN, project: 'cerebra', kind: 'lifecycle', type: 'CycleStarted', cycle: this.sim.cycleN, ts });
        if (!bootstrap) {
          const marker = 'cyc_' + this.sim.cycleN;
          this.setState({ newCycleId: marker });
          setTimeout(() => { if (this.state.newCycleId === marker) this.setState({ newCycleId: null }); }, 2600);
        }
      }
      adds.push({ id: 'lc_' + this.sim.tickN, project: 'cerebra', kind: 'lifecycle', type: 'StepStarted', step: this.sim.stepN, cycle: this.sim.cycleN, ts });
    } else if (phase === 1) {
      const composite = 58 + Math.floor(Math.random() * 30);
      const signals = {};
      ['COH', 'GND', 'GEN', 'REL', 'PRE', 'EPH'].forEach(s => { signals[s] = Math.max(35, Math.min(99, composite + Math.floor((Math.random() - 0.5) * 14))); });
      const ev = { id: 'pred_' + this.sim.tickN, project: 'cerebra', kind: 'data', type: 'PredictionMade', basis: Math.random() < 0.72 ? 'baseline' : 'refined', composite, signals, step: this.sim.stepN, cycle: this.sim.cycleN, ts };
      adds.push(ev); this.sim.lastPrediction = ev;
    } else if (phase === 2) {
      adds.push({ id: 'eval_' + this.sim.tickN, project: 'cerebra', kind: 'data', type: 'SignalEvaluated', count: 6, value: 96 + Math.floor(Math.random() * 5), step: this.sim.stepN, cycle: this.sim.cycleN, ts });
    } else if (phase === 3) {
      const isSevere = !bootstrap && (this.sim.stepN % 24) === 7;
      const pred = this.sim.lastPrediction ? this.sim.lastPrediction.composite : 65;
      const actual = isSevere ? Math.max(15, pred - 35 - Math.random() * 8) : Math.max(20, Math.min(98, pred - 6 + Math.random() * 14));
      const errClass = isSevere ? 'severe' : Math.random() < 0.18 ? 'notable' : 'noise';
      const verdict = isSevere ? 'STOP' : (Math.random() < 0.8 ? 'ACCEPT' : 'REFINE');
      const id = 'out_' + this.sim.tickN;
      adds.push({ id, project: 'cerebra', kind: 'data', type: 'OutcomeRecorded', composite: Math.round(actual), predicted: pred, errClass, verdict, step: this.sim.stepN, cycle: this.sim.cycleN, ts });
      if (isSevere) {
        this.setState({ severeId: id });
        setTimeout(() => { if (this.state.severeId === id) this.setState({ severeId: null }); }, 9000);
      }
    }
    if (this.sim.tickN % 2 === 0) {
      const r = Math.random();
      let verdict, cmd;
      if (r < 0.84) { verdict = 'ALLOW'; cmd = ['file.read', 'git.status', 'ls -la', 'grep -r', 'fs.stat'][Math.floor(Math.random() * 5)]; }
      else if (r < 0.95) { verdict = 'SANDBOX_FIRST'; cmd = 'cmd.exec ' + ['npm install', 'cargo build', 'pnpm i'][Math.floor(Math.random() * 3)]; }
      else { verdict = 'DENY'; cmd = ['cmd.exec rm -rf', 'net.fetch external', 'fs.write outside scope'][Math.floor(Math.random() * 3)]; }
      adds.push({ id: 'dec_' + this.sim.tickN, project: 'policy', kind: 'data', type: 'DecisionIssued', verdict, cmd, ts });
    }
    if (this.sim.tickN % 6 === 0) {
      adds.push({ id: 'inf_' + this.sim.tickN, project: 'aistack', kind: 'data', type: 'InferenceCall', model: ['claude-haiku', 'llama3:70b', 'qwen2:7b'][Math.floor(Math.random() * 3)], ts });
    }
    if (this.sim.tickN % 32 === 11) {
      adds.push({ id: 'lw_' + this.sim.tickN, project: 'lumaweave', kind: 'data', type: 'SourceLoaded', nodes: 400 + Math.floor(Math.random() * 60), edges: 1180 + Math.floor(Math.random() * 80), ts });
    }
    if (this.sim.tickN % 140 === 25) {
      adds.push({ id: 'lat_' + this.sim.tickN, project: 'lattica', kind: 'data', type: 'PaneOpened', ts });
    }
    if (adds.length) {
      const updated = [...adds.reverse(), ...this.state.events].slice(0, 800);
      if (bootstrap) this.state.events = updated; else this.setState({ events: updated });
    }
  }

  rollingRate(project, windowMs = 8000) {
    const cutoff = Date.now() - windowMs;
    const n = this.state.events.filter(e => e.project === project && e.ts > cutoff).length;
    return n / (windowMs / 1000);
  }

  fmtAge(ts) {
    const d = Math.floor((this.state.now - ts) / 1000);
    if (d < 1) return 'now';
    if (d < 60) return d + 's';
    if (d < 3600) return Math.floor(d / 60) + 'm';
    return Math.floor(d / 3600) + 'h';
  }

  fmtClock(ts) {
    const d = new Date(ts);
    return d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
  }

  cycleColor(cycleN) {
    if (cycleN == null) return '#6B7A8A';
    const n = ((cycleN % this.cycleColors.length) + this.cycleColors.length) % this.cycleColors.length;
    return this.cycleColors[n];
  }

  breathPattern(rate) {
    if (rate >= 1.0) return { animation: 'la-stripe-fast 1.6s ease-in-out infinite', label: 'fast' };
    if (rate > 0.05) return { animation: 'la-stripe-slow 5s ease-in-out infinite', label: 'slow' };
    return { animation: null, label: 'still' };
  }

  handleCerebraScroll = (e) => {
    const atTop = e.target.scrollTop < 8;
    if (atTop !== this.state.cerebraAtTop) this.setState({ cerebraAtTop: atTop });
  };

  cyclePosture = () => {
    const next = { WATCH: 'STRICT', STRICT: 'LOCKDOWN', LOCKDOWN: 'WATCH' };
    this.setState({ posture: next[this.state.posture] });
  };

  resolveApproval = (id, decision) => {
    this.setState({ psApprovals: this.state.psApprovals.map(a => a.id === id ? { ...a, status: decision } : a) });
    setTimeout(() => this.setState(s => ({ psApprovals: s.psApprovals.filter(a => a.id !== id) })), 2000);
  };

  openTilePicker = (paneId) => (e) => { if (e) e.stopPropagation(); this.setState({ tilePickerOpenFor: paneId }); };
  closeTilePicker = () => this.setState({ tilePickerOpenFor: null });
  selectTile = (paneId, kind) => this.setState({ tiles: { ...this.state.tiles, [paneId]: kind }, tilePickerOpenFor: null });

  toggleFreeze = (paneId) => () => {
    const cur = this.state.frozen[paneId];
    this.setState({ frozen: { ...this.state.frozen, [paneId]: cur ? null : { since: Date.now() } } });
  };

  toggleArchiveChunk = (chunkId) => () => {
    this.setState({ archiveOpen: { ...this.state.archiveOpen, [chunkId]: !this.state.archiveOpen[chunkId] } });
  };

  // ===== Project meta lookups =====
  paneProject(paneId) {
    const tile = this.state.tiles[paneId];
    if (paneId === 'left') return 'cerebra';
    if (paneId === 'topRight') return 'policy';
    if (tile === 'fossic') return 'fossic';
    if (tile === 'lumaweave') return 'lumaweave';
    if (tile === 'aistack') return 'aistack';
    return null;
  }

  // ============ Activity scope (6 lanes) ============
  scopeProjects() {
    return [
      { key: 'lattica', label: 'lattica', color: '#F2A85C', bg: 'rgba(242,168,92,0.07)' },
      { key: 'cerebra', label: 'cerebra', color: '#22E0C4', bg: 'rgba(34,224,196,0.07)' },

    const cerebraRate = this.rollingRate('cerebra');
    const policyRate = this.rollingRate('policy');
    const platformRate = (cerebraRate + policyRate + this.rollingRate('lumaweave') + this.rollingRate('aistack')).toFixed(1);
    return {
      drawerOpen: this.state.drawerOpen,
      drawerArrow: this.state.drawerOpen ? '\u25b4' : '\u25be',
      toggleDrawer: () => this.setState({ drawerOpen: !this.state.drawerOpen }),
      causationActive: this.state.causationActive,
      tilePickerOpenAny: this.state.tilePickerOpenFor !== null,
      closeTilePicker: this.closeTilePicker,
      platformRateLabel: platformRate + '/s',
      activityScope: this.renderActivityScope(),
      cerebraPane: this.renderCerebraPane(),
      policyPane: this.renderPolicyPane(),
      bottomPane: this.renderBottomPane(),
      drawerNode: this.renderDrawer()
    };
  }
}
</script>
</body>
</html>
